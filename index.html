<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arctic Lion Studios</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-size: 3.5rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 20px;
      color: #e6f7ff;
      text-shadow:
        0 0 5px #00ccff,
        0 0 15px #00ccff,
        0 0 30px #0099cc;
    }

    p {
      font-size: 1.3rem;
      letter-spacing: 2px;
      color: #aaa;
      animation: pulse 2.5s infinite;
    }

    /* subtle moving background effect */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0,204,255,0.05) 0%, transparent 70%);
      animation: moveBg 10s linear infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @keyframes moveBg {
      from { transform: translate(0, 0); }
      to { transform: translate(-25%, -25%); }
    }
  </style>

</head>

<body>
  <div class="container">
    <h1>Arctic Lion Studios</h1>
    <p>Coming Soon</p>
  </div>
</body>
</html>
